# @package model.sequence
# Stage 2: Note sequence generation model configuration
vocab_size: 183  # Must match tokenizer.VOCAB_SIZE
d_model: 512
nhead: 8
num_layers: 8
dim_feedforward: 2048
num_difficulties: 5
num_genres: 1  # Effectively disabled — all maps map to genre index 0. Kept as plumbing for future use.
dropout: 0.1

# Conditioning dropout for Classifier-Free Guidance
conditioning_dropout: 0.2  # 20% dropout on difficulty/genre embeddings during training

# Training
learning_rate: 0.0001  # Lowered from 3e-4 to prevent catastrophic divergence
weight_decay: 0.01
max_seq_length: 64  # Max tokens per onset timestamp
label_smoothing: 0.1
rhythm_weight: 3.0  # 3x weight on timing-sensitive tokens (EVENT_TYPE, SEP)
eos_weight: 1.0  # Normal weight — training data has no empty onsets (preprocessing filters them)
freeze_encoder: false
warmup_steps: 2000  # Smoother ramp with larger dataset
lr_min_ratio: 0.01  # Cosine floor at 1e-6 prevents dead learning
token_dropout: 0.1  # Replace 10% of decoder input tokens with random tokens
rare_event_weight: 3.0  # V4: CE weight for ARC_START/ARC_END/CHAIN/BOMB tokens
bomb_weight: 2.0  # V4: slightly less than arcs/chains

# Dataset
context_frames: 256  # Mel frames around each onset (~3 seconds of audio context)
# NOTE: 512 was 16x compute cost due to O(T²) encoder self-attention with no CNN downsampling.
# 256 gives 3 seconds (~16 beats at 120 BPM), 4x cost instead of 16x.

# Inter-onset context: feed previous K onset token sequences to break mode collapse
prev_context_k: 8  # Number of previous onset sequences (0 = disabled)

# Auxiliary losses
flow_loss_alpha: 0.40  # V4: Per-color parity loss (was 0.25 — too weak vs CE)
ergo_loss_alpha: 0.15  # Color-side preference loss (red→left, blue→right)
follow_through_alpha: 0.35  # V4 NEW: penalize swing-dir vs. movement-vec misalignment
intra_onset_parity_alpha: 0.25  # V4 NEW: parity within chord-like onsets

# Onset planner (song-level context)
use_planner: false  # Enable bidirectional onset planner for song-level planning
planner_layers: 4   # Transformer encoder layers in planner
planner_heads: 8    # Attention heads in planner

# Data augmentation
mirror_augment: true  # 50% chance to flip left/right + swap colors (train only)

# Difficulty filtering (null = all difficulties)
# V4: Expert-only training to nail architecture; ExpertPlus can be added later.
difficulties:
  - Expert

# Inference
beam_size: 8
temperature: 0.95
top_p: 0.92  # Nucleus sampling threshold
min_length: 7  # Min tokens before EOS: BOS + NOTE + COLOR + COL + ROW + DIR + ANGLE = 7
repetition_penalty: 1.2  # Divide logits of recently generated tokens by this factor
